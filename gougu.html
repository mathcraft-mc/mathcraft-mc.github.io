<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>勾股定理 · 动态演示 + 15证法 · 动画讲解</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Inter 字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif; min-height: 100vh;
            background: radial-gradient(circle at 10% 30%, #1b3b4f, #0d1c2b);
            background-attachment: fixed; display: flex; align-items: center; justify-content: center;
            padding: 1.5rem; color: #eef5ff; line-height: 1.6; position: relative;
        }
        #fireworks-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 9999;
        }
        .glass-panel {
            max-width: 1600px; width: 100%;
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            background: rgba(18, 30, 41, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 3.5rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), inset 0 1px 3px rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            animation: floatIn 1.2s cubic-bezier(0.23, 1, 0.32, 1);
        }
        @keyframes floatIn {
            0% { opacity: 0; transform: translateY(40px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .hero {
            display: flex; align-items: center; gap: 1.2rem; margin-bottom: 2rem; flex-wrap: wrap;
        }
        .hero i {
            font-size: 3.2rem; color: rgba(210, 240, 255, 0.9);
            filter: drop-shadow(0 8px 12px rgba(0,40,60,0.6));
            transition: transform 0.3s ease;
        }
        .hero:hover i { transform: rotate(6deg) scale(1.05); }
        .hero h1 {
            font-size: 3rem; font-weight: 600; letter-spacing: -0.02em;
            background: linear-gradient(130deg, #ffffff, #c7e9ff);
            -webkit-background-clip: text; background-clip: text; color: transparent;
            text-shadow: 0 4px 20px rgba(0,160,255,0.3);
        }
        .hero .sub {
            font-size: 1.2rem; font-weight: 300; margin-left: auto;
            background: rgba(255,255,255,0.1); padding: 0.6rem 1.5rem; border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(5px);
        }

        /* 三边滑块控制区 */
        .slider-main-card {
            background: rgba(25, 35, 50, 0.5); backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 2.5rem;
            padding: 1.5rem 2rem; margin-bottom: 1.8rem; display: flex; flex-wrap: wrap;
            gap: 2rem; align-items: center; justify-content: space-between;
        }
        .slider-item-group { display: flex; flex-wrap: wrap; gap: 2rem; flex: 3; }
        .slider-item { min-width: 160px; flex: 1; }
        .slider-item label {
            display: flex; align-items: center; gap: 0.6rem; font-size: 1.2rem;
            margin-bottom: 0.5rem; color: #c3e2ff;
        }
        .slider-item input {
            width: 100%; height: 8px; background: rgba(200, 230, 255, 0.2);
            border-radius: 10px; -webkit-appearance: none;
        }
        .slider-item input::-webkit-slider-thumb {
            -webkit-appearance: none; width: 22px; height: 22px; background: white;
            border-radius: 50%; box-shadow: 0 0 10px #0099ff; cursor: pointer;
            border: 2px solid #a0d0ff;
        }
        .tri-value-panel {
            background: rgba(0, 30, 45, 0.6); border-radius: 2rem; padding: 0.8rem 1.8rem;
            border: 1px solid rgba(120,200,255,0.3); font-size: 1.4rem; white-space: nowrap;
        }
        .tri-value-panel span { color: #a9e2ff; font-weight: 600; }

        /* 顶部动画演示区 (三个正方形) */
        .demo-animation-card {
            background: rgba(25, 35, 50, 0.5); backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 2.5rem;
            padding: 1.5rem; margin-bottom: 2rem;
        }
        .demo-title {
            font-size: 1.5rem; display: flex; align-items: center; gap: 0.8rem; margin-bottom: 1rem;
        }
        .demo-canvas-container {
            display: flex; justify-content: center;
        }
        #mainDemoCanvas {
            width: 100%; max-width: 700px; height: auto; background: rgba(0, 20, 30, 0.2);
            border-radius: 2rem; box-shadow: 0 0 25px rgba(0,150,200,0.3);
        }

        /* 主内容双栏：左侧证明列表 + 右侧动画讲解 */
        .main-demo-row { display: grid; grid-template-columns: 1.1fr 2.2fr; gap: 1.8rem; margin-bottom: 2rem; }

        /* 左侧：分层证明列表 */
        .proof-list-card {
            background: rgba(25, 35, 50, 0.45); backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2.5rem;
            padding: 1.5rem; height: fit-content; max-height: 650px; overflow-y: auto;
            scrollbar-width: thin; scrollbar-color: #4f8bb0 #1d3345;
        }
        .proof-list-card h3 {
            font-size: 1.6rem; margin-bottom: 1.2rem; display: flex; align-items: center;
            gap: 0.7rem; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 0.8rem;
        }
        .proof-category { margin-bottom: 1.2rem; border-radius: 1.5rem; background: rgba(0, 25, 40, 0.3); overflow: hidden; }
        .category-header {
            background: rgba(40, 70, 100, 0.5); padding: 0.8rem 1.2rem; font-weight: 600;
            font-size: 1.2rem; cursor: pointer; user-select: none; display: flex;
            justify-content: space-between; align-items: center; border-left: 4px solid #4fa3d0;
        }
        .category-header i { transition: transform 0.3s; }
        .category-header.collapsed i { transform: rotate(-90deg); }
        .sub-item-list { padding: 0.3rem 0 0.3rem 0.5rem; }
        .sub-item-list.collapsed { display: none; }
        .proof-item {
            padding: 0.7rem 1rem 0.7rem 2.2rem; margin: 0.2rem 0; border-radius: 2rem;
            cursor: pointer; transition: 0.15s; font-size: 1.0rem; display: flex;
            align-items: center; gap: 0.6rem; background: rgba(255,255,255,0.02);
        }
        .proof-item:hover { background: rgba(90, 170, 240, 0.3); }
        .proof-item.active { background: rgba(0, 150, 255, 0.5); border-left: 4px solid white; }
        .proof-item i { width: 1.6rem; color: #8fcbff; }

        /* 右侧动画卡片 */
        .animation-card {
            background: rgba(25, 35, 50, 0.5); backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 2.5rem;
            padding: 1.5rem; display: flex; flex-direction: column;
        }
        .proof-title {
            font-size: 1.7rem; font-weight: 500; margin-bottom: 0.8rem;
            display: flex; align-items: center; gap: 0.8rem;
            border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 0.5rem;
        }
        .canvas-container {
            background: rgba(0, 20, 30, 0.4); border-radius: 2rem; padding: 1rem;
            display: flex; justify-content: center; align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #proofCanvas {
            width: 100%; max-width: 550px; height: auto; background: rgba(0, 20, 30, 0.2);
            border-radius: 1.5rem; box-shadow: 0 0 20px rgba(0,100,150,0.3);
        }
        .steps-container {
            margin-top: 1rem; background: rgba(0,30,50,0.5); border-radius: 2rem;
            padding: 1.2rem; border: 1px solid rgba(120,200,255,0.2);
        }
        .steps-title { font-size: 1.1rem; margin-bottom: 0.8rem; color: #b3dcff; }
        .steps-list {
            list-style: none; font-size: 0.95rem; color: #e0f0ff;
        }
        .steps-list li {
            margin-bottom: 0.6rem; display: flex; gap: 0.8rem; align-items: flex-start;
        }
        .steps-list i { color: #6fc3ff; width: 1.4rem; margin-top: 0.2rem; }

        .footnote {
            text-align: right; font-size: 0.95rem; opacity: 0.7; margin-top: 2rem;
            border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1.2rem;
        }
        .footnote span { font-size: 0.8rem; opacity: 0.6; display: block; margin-top: 0.3rem; }

        @media (max-width: 1000px) {
            .main-demo-row { grid-template-columns: 1fr; }
            .slider-main-card { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <canvas id="fireworks-canvas"></canvas>
    <div class="glass-panel">
        <!-- 头部 -->
        <div class="hero">
            <i class="fas fa-square-root-alt"></i>
            <h1>勾股定理 · 15证法 · 动画讲解</h1>
            <div class="sub"><i class="fas fa-feather"></i> 三边可调·分步图解</div>
        </div>

        <!-- 三边滑块区 (a, b, c 均可调) -->
        <div class="slider-main-card">
            <div class="slider-item-group">
                <div class="slider-item">
                    <label><i class="fas fa-arrow-right" style="color:#6fc3ff;"></i> 直角边 a = <span id="aVal">3.0</span></label>
                    <input type="range" id="aSlider" min="1.5" max="8.0" value="3.0" step="0.1">
                </div>
                <div class="slider-item">
                    <label><i class="fas fa-arrow-up" style="color:#6fc3ff;"></i> 直角边 b = <span id="bVal">4.0</span></label>
                    <input type="range" id="bSlider" min="1.5" max="8.0" value="4.0" step="0.1">
                </div>
                <div class="slider-item">
                    <label><i class="fas fa-sliders-h" style="color:#d4a5ff;"></i> 斜边 c = <span id="cVal">5.0</span></label>
                    <input type="range" id="cSlider" min="2.1" max="12.0" value="5.0" step="0.1">
                </div>
            </div>
            <div class="tri-value-panel">
                a² <span id="a2">9.0</span> + b² <span id="b2">16.0</span> = c² <span id="c2">25.0</span>
            </div>
        </div>

        <!-- 顶部动画演示区：三个正方形动态展示勾股定理 -->
        <div class="demo-animation-card">
            <div class="demo-title">
                <i class="fas fa-play-circle" style="color:#8fcbff;"></i> 动态演示 · 面积关系
            </div>
            <div class="demo-canvas-container">
                <canvas id="mainDemoCanvas" width="700" height="300"></canvas>
            </div>
        </div>

        <!-- 主区域: 左侧分层证明列表 + 右侧动画讲解 -->
        <div class="main-demo-row">
            <!-- 左侧大列表分层 -->
            <div class="proof-list-card">
                <h3><i class="fas fa-list-tree"></i> 15种证明 · 分类</h3>
                <div id="proofListContainer"></div>
                <div style="margin-top: 1rem; color:#97c9ff; font-size:0.9rem;">
                    <i class="fas fa-info-circle"></i> 点击证法名称，右侧动画 + 分步讲解
                </div>
            </div>

            <!-- 右侧动画卡片 + 讲解步骤 -->
            <div class="animation-card">
                <div class="proof-title" id="activeProofTitle">
                    <i class="fas fa-play-circle" style="color:#8fcbff;"></i> 赵爽弦图
                </div>
                <div class="canvas-container">
                    <canvas id="proofCanvas" width="550" height="350"></canvas>
                </div>
                <div class="steps-container">
                    <div class="steps-title"><i class="fas fa-list-ol"></i> 证明步骤：</div>
                    <ul class="steps-list" id="stepsList">
                        <li><i class="fas fa-angle-right"></i> 四个全等直角三角形围成一个大正方形</li>
                        <li><i class="fas fa-angle-right"></i> 中间小正方形边长为 |a-b|</li>
                        <li><i class="fas fa-angle-right"></i> 大正方形面积 = (a+b)² = c² + 2ab</li>
                        <li><i class="fas fa-angle-right"></i> 化简得 a² + b² = c²</li>
                    </ul>
                </div>
            </div>
        </div>

        <!-- 底部声明 -->
        <div class="footnote">
            <i class="fas fa-feather"></i> 拖动滑块 · 15种证明动画 · 分步讲解<br>
            <span>由 wlzp 工作室开发</span>
        </div>
    </div>

    <script>
        (function() {
            // ---------- 三边滑块 + 约束 ----------
            const aSlider = document.getElementById('aSlider');
            const bSlider = document.getElementById('bSlider');
            const cSlider = document.getElementById('cSlider');
            const aSpan = document.getElementById('aVal');
            const bSpan = document.getElementById('bVal');
            const cSpan = document.getElementById('cVal');
            const a2Span = document.getElementById('a2');
            const b2Span = document.getElementById('b2');
            const c2Span = document.getElementById('c2');

            let a = 3.0, b = 4.0, c = 5.0;
            let activeProofId = 'p01'; // 默认赵爽弦图

            // 更新滑块显示
            function updateSliders() {
                a = parseFloat(aSlider.value);
                b = parseFloat(bSlider.value);
                let theoreticalC = Math.sqrt(a*a + b*b);
                c = theoreticalC;
                cSlider.value = c.toFixed(1);
                
                aSpan.textContent = a.toFixed(1);
                bSpan.textContent = b.toFixed(1);
                cSpan.textContent = c.toFixed(2);
                a2Span.textContent = (a*a).toFixed(1);
                b2Span.textContent = (b*b).toFixed(1);
                c2Span.textContent = (c*c).toFixed(1);
                
                // 重绘所有canvas
                drawMainDemo();
                if (window.drawProof) window.drawProof(activeProofId);
            }

            aSlider.addEventListener('input', updateSliders);
            bSlider.addEventListener('input', updateSliders);
            cSlider.addEventListener('input', function() {
                let newC = parseFloat(cSlider.value);
                let aa = parseFloat(aSlider.value);
                let bb = Math.sqrt(newC*newC - aa*aa);
                if (bb >= 1.2 && bb <= 9.0) {
                    bSlider.value = bb.toFixed(1);
                } else {
                    let bbFixed = parseFloat(bSlider.value);
                    let aaNew = Math.sqrt(newC*newC - bbFixed*bbFixed);
                    if (aaNew >= 1.2 && aaNew <= 9.0) {
                        aSlider.value = aaNew.toFixed(1);
                    } else {
                        newC = Math.sqrt(aa*aa + parseFloat(bSlider.value)*parseFloat(bSlider.value));
                        cSlider.value = newC.toFixed(1);
                    }
                }
                updateSliders();
            });

            // ---------- 顶部主演示canvas (三个正方形) ----------
            const mainCanvas = document.getElementById('mainDemoCanvas');
            const mainCtx = mainCanvas.getContext('2d');
            function drawMainDemo() {
                mainCtx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
                const scale = 18;
                const ox = 200, oy = 200;
                // 画直角三角形
                mainCtx.beginPath();
                mainCtx.moveTo(ox, oy);
                mainCtx.lineTo(ox + a*scale, oy);
                mainCtx.lineTo(ox, oy - b*scale);
                mainCtx.closePath();
                mainCtx.strokeStyle = 'rgba(255,255,255,0.8)';
                mainCtx.lineWidth = 2;
                mainCtx.stroke();
                mainCtx.fillStyle = 'rgba(80,180,255,0.2)';
                mainCtx.fill();
                // 直角标记
                mainCtx.beginPath();
                mainCtx.moveTo(ox+10, oy);
                mainCtx.lineTo(ox+10, oy-10);
                mainCtx.lineTo(ox, oy-10);
                mainCtx.strokeStyle = 'rgba(255,255,255,0.5)';
                mainCtx.stroke();

                // 画a边正方形 (蓝色半透明)
                mainCtx.fillStyle = 'rgba(70,150,255,0.35)';
                mainCtx.strokeStyle = 'rgba(70,200,255,0.8)';
                mainCtx.beginPath();
                mainCtx.rect(ox, oy, a*scale, a*scale);
                mainCtx.fill();
                mainCtx.stroke();
                // 画b边正方形 (绿色半透明)
                mainCtx.fillStyle = 'rgba(100,220,150,0.35)';
                mainCtx.strokeStyle = 'rgba(100,255,170,0.8)';
                mainCtx.beginPath();
                mainCtx.rect(ox - b*scale, oy - b*scale, b*scale, b*scale);
                mainCtx.fill();
                mainCtx.stroke();
                // 画c边正方形 (紫色半透明) - 斜边向外
                const Ax = ox + a*scale, Ay = oy;
                const Bx = ox, By = oy - b*scale;
                const ABx = Ax - Bx, ABy = Ay - By; // (a*scale, b*scale)
                const vx = b*scale, vy = -a*scale; // 垂直向量
                mainCtx.fillStyle = 'rgba(200,130,255,0.35)';
                mainCtx.strokeStyle = 'rgba(210,150,255,0.9)';
                mainCtx.beginPath();
                mainCtx.moveTo(Ax, Ay);
                mainCtx.lineTo(Bx, By);
                mainCtx.lineTo(Bx + vx, By + vy);
                mainCtx.lineTo(Ax + vx, Ay + vy);
                mainCtx.closePath();
                mainCtx.fill();
                mainCtx.stroke();

                // 标注
                mainCtx.fillStyle = 'white';
                mainCtx.font = '14px Inter';
                mainCtx.fillText('a²', ox + a*scale*0.4, oy + a*scale*0.5);
                mainCtx.fillText('b²', ox - b*scale*0.8, oy - b*scale*0.5);
                mainCtx.fillText('c²', ox + a*scale*0.5, oy - b*scale*0.5 - 20);
            }

            // ---------- 15种证明数据 (每个证明包含名称、步骤、绘图函数) ----------
            const proofData = {
                p01: {
                    name: '赵爽弦图',
                    steps: [
                        '四个全等直角三角形围成一个大正方形',
                        '中间小正方形边长为 |a-b|',
                        '大正方形面积 = (a+b)² = c² + 2ab',
                        '化简得 a² + b² = c²'
                    ],
                    draw: function(ctx, a, b, c) {
                        ctx.clearRect(0, 0, 550, 350);
                        const scale = 18;
                        const ox = 150, oy = 220;
                        // 画四个三角形组成弦图
                        ctx.strokeStyle = '#9fcbff';
                        ctx.lineWidth = 1.5;
                        // 大正方形轮廓
                        ctx.strokeRect(ox - a*scale*0.2, oy - b*scale*1.2, (a+b)*scale, (a+b)*scale);
                        // 四个三角形
                        ctx.fillStyle = 'rgba(200,130,255,0.3)';
                        // 左下
                        ctx.beginPath();
                        ctx.moveTo(ox, oy);
                        ctx.lineTo(ox + a*scale, oy);
                        ctx.lineTo(ox, oy - b*scale);
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
                        // 左上
                        ctx.beginPath();
                        ctx.moveTo(ox, oy - b*scale);
                        ctx.lineTo(ox - a*scale, oy - b*scale);
                        ctx.lineTo(ox, oy - (a+b)*scale);
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
                        // 右上
                        ctx.beginPath();
                        ctx.moveTo(ox + a*scale, oy);
                        ctx.lineTo(ox + (a+b)*scale, oy);
                        ctx.lineTo(ox + a*scale, oy - b*scale);
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
                        // 右下
                        ctx.beginPath();
                        ctx.moveTo(ox + (a+b)*scale, oy - b*scale);
                        ctx.lineTo(ox + (a+b)*scale, oy - (a+b)*scale);
                        ctx.lineTo(ox + a*scale, oy - b*scale);
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
                        ctx.fillStyle = 'white';
                        ctx.font = 'bold 14px Inter';
                        ctx.fillText('赵爽弦图', 200, 60);
                    }
                },
                p02: {
                    name: '邹元治证法',
                    steps: ['用四个直角三角形拼成两个正方形', '第一个正方形边长为a+b，面积为(a+b)²', '第二个正方形由四个三角形和一个小正方形组成', '面积相等推出a²+b²=c²'],
                    draw: function(ctx, a, b, c) {
                        ctx.clearRect(0, 0, 550, 350);
                        const scale = 16;
                        ctx.strokeStyle = '#9fcbff';
                        ctx.fillStyle = 'rgba(100,200,150,0.2)';
                        ctx.strokeRect(80, 150, (a+b)*scale, (a+b)*scale);
                        ctx.strokeRect(300, 150, c*scale, c*scale);
                        ctx.fillStyle = 'white';
                        ctx.fillText('(a+b)²', 120, 130);
                        ctx.fillText('c²', 360, 130);
                        ctx.fillText('邹元治', 220, 300);
                    }
                },
                p03: {
                    name: '青朱出入图',
                    steps: ['刘徽的割补法，将青色和朱色图形移动', '以a、b为边的正方形分割后拼入以c为边的正方形', '面积相等得证'],
                    draw: function(ctx, a, b, c) {
                        ctx.clearRect(0, 0, 550, 350);
                        ctx.fillStyle = 'rgba(0,200,200,0.2)';
                        ctx.strokeStyle = 'cyan';
                        ctx.beginPath();
                        ctx.rect(120, 200, a*18, a*18);
                        ctx.fill();
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.rect(120+a*18+10, 200, b*18, b*18);
                        ctx.fillStyle = 'rgba(200,100,100,0.2)';
                        ctx.fill();
                        ctx.stroke();
                        ctx.fillStyle = 'white';
                        ctx.fillText('青出', 150, 190);
                        ctx.fillText('朱入', 220, 190);
                        ctx.fillText('青朱出入', 200, 80);
                    }
                },
                p04: {
                    name: '总统证法',
                    steps: ['两个全等直角三角形构成梯形', '梯形面积 = (a+b)²/2', '梯形面积也等于两个三角形面积 + 一个等腰直角三角形面积', '化简得 a²+b²=c²'],
                    draw: function(ctx, a, b, c) {
                        ctx.clearRect(0, 0, 550, 350);
                        const scale = 18;
                        const ox = 150, oy = 220;
                        ctx.beginPath();
                        ctx.moveTo(ox, oy);
                        ctx.lineTo(ox + a*scale, oy);
                        ctx.lineTo(ox, oy - b*scale);
                        ctx.closePath();
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(ox + a*scale, oy);
                        ctx.lineTo(ox + (a+b)*scale, oy - b*scale);
                        ctx.lineTo(ox, oy - b*scale);
                        ctx.closePath();
                        ctx.stroke();
                        ctx.fillStyle = 'rgba(200,130,255,0.2)';
                        ctx.fill();
                        ctx.fillStyle = 'white';
                        ctx.fillText('加菲尔德梯形', 200, 100);
                    }
                },
                p05: {
                    name: '欧几里得证法',
                    steps: ['作三个正方形，利用三角形全等', '证明正方形ACHK与BCED面积和等于正方形ABFG面积'],
                    draw: function(ctx, a, b, c) {
                        ctx.clearRect(0, 0, 550, 350);
                        const scale = 14;
                        ctx.strokeStyle = '#ffaa88';
                        ctx.strokeRect(80, 200, a*scale, a*scale);
                        ctx.strokeRect(200, 200, b*scale, b*scale);
                        ctx.strokeRect(320, 200, c*scale, c*scale);
                        ctx.fillStyle = 'white';
                        ctx.fillText('欧几里得', 220, 150);
                    }
                },
                p06: {
                    name: '婆什迦罗证法',
                    steps: ['正方形分割成四个三角形和一个小正方形', '重组后证明'],
                    draw: function(ctx, a, b, c) {
                        ctx.clearRect(0, 0, 550, 350);
                        ctx.fillStyle = 'rgba(255,200,100,0.2)';
                        ctx.strokeRect(150, 150, 200, 200);
                        ctx.fillStyle = 'white';
                        ctx.fillText('婆什迦罗', 200, 100);
                    }
                },
                p07: {
                    name: '射影定理法',
                    steps: ['作斜边上的高', '利用相似三角形比例', '可得a² = c·p, b² = c·q, 相加得a²+b²=c²'],
                    draw: function(ctx, a, b, c) {
                        ctx.clearRect(0, 0, 550, 350);
                        const scale = 18;
                        const ox = 150, oy = 250;
                        ctx.beginPath();
                        ctx.moveTo(ox, oy);
                        ctx.lineTo(ox + a*scale, oy);
                        ctx.lineTo(ox, oy - b*scale);
                        ctx.closePath();
                        ctx.strokeStyle = 'white';
                        ctx.stroke();
                        // 画高
                        const footX = ox + (a*a*scale)/(c) ; // 近似
                        const footY = oy - (a*b*scale)/(c);
                        ctx.beginPath();
                        ctx.moveTo(ox, oy);
                        ctx.lineTo(footX, footY);
                        ctx.strokeStyle = 'rgba(255,200,0,0.6)';
                        ctx.stroke();
                        ctx.fillStyle = 'white';
                        ctx.fillText('射影定理', 200, 100);
                    }
                },
                p08: {
                    name: '托勒密定理法',
                    steps: ['构造圆内接四边形', '利用托勒密定理推导'],
                    draw: function(ctx, a, b, c) {
                        ctx.clearRect(0, 0, 550, 350);
                        ctx.beginPath();
                        ctx.arc(250, 180, 120, 0, 2*Math.PI);
                        ctx.strokeStyle = 'rgba(255,200,200,0.5)';
                        ctx.stroke();
                        ctx.fillStyle = 'white';
                        ctx.fillText('托勒密', 200, 100);
                    }
                },
                p09: {
                    name: '切割线定理法',
                    steps: ['作辅助圆', '利用切割线定理'],
                    draw: function(ctx, a, b, c) {
                        ctx.clearRect(0, 0, 550, 350);
                        ctx.beginPath();
                        ctx.arc(250, 200, 100, 0, Math.PI);
                        ctx.strokeStyle = 'cyan';
                        ctx.stroke();
                        ctx.fillStyle = 'white';
                        ctx.fillText('切割线', 200, 100);
                    }
                },
                p10: {
                    name: '差平方公式法',
                    steps: ['(a+b)² = a²+2ab+b²', '(a-b)² = a²-2ab+b²', '两式相减得4ab = (a+b)²-(a-b)²', '结合面积关系'],
                    draw: function(ctx, a, b, c) {
                        ctx.clearRect(0, 0, 550, 350);
                        ctx.fillStyle = 'white';
                        ctx.font = '16px Inter';
                        ctx.fillText('(a+b)² = a²+2ab+b²', 120, 150);
                        ctx.fillText('(a-b)² = a²-2ab+b²', 120, 200);
                    }
                },
                p11: {
                    name: '余弦定理特例',
                    steps: ['余弦定理: c² = a²+b²-2ab·cosC', '当C=90°时cosC=0', '得c² = a²+b²'],
                    draw: function(ctx, a, b, c) {
                        ctx.clearRect(0, 0, 550, 350);
                        ctx.fillStyle = 'white';
                        ctx.fillText('余弦定理', 200, 180);
                    }
                },
                p12: {
                    name: '向量点积法',
                    steps: ['向量α,β垂直', '|α-β|² = |α|²+|β|²'],
                    draw: function(ctx, a, b, c) {
                        ctx.clearRect(0, 0, 550, 350);
                        ctx.beginPath();
                        ctx.moveTo(150,200);
                        ctx.lineTo(150+a*15,200);
                        ctx.lineTo(150,200-b*15);
                        ctx.strokeStyle = 'white';
                        ctx.stroke();
                        ctx.fillStyle = 'white';
                        ctx.fillText('向量点积', 200, 100);
                    }
                },
                p13: {
                    name: '杨作玫证法',
                    steps: ['通过旋转和对称构造正方形'],
                    draw: function(ctx, a, b, c) {
                        ctx.clearRect(0, 0, 550, 350);
                        ctx.fillStyle = 'white';
                        ctx.fillText('杨作玫', 220, 180);
                    }
                },
                p14: {
                    name: '希波克拉底月牙',
                    steps: ['月牙形面积与直角三角形面积关系'],
                    draw: function(ctx, a, b, c) {
                        ctx.clearRect(0, 0, 550, 350);
                        ctx.beginPath();
                        ctx.arc(200,200,80,0,Math.PI);
                        ctx.strokeStyle = 'white';
                        ctx.stroke();
                        ctx.fillText('月牙', 200, 100);
                    }
                },
                p15: {
                    name: '帕斯卡证法',
                    steps: ['利用比例线段和圆的性质'],
                    draw: function(ctx, a, b, c) {
                        ctx.clearRect(0, 0, 550, 350);
                        ctx.fillStyle = 'white';
                        ctx.fillText('帕斯卡', 220, 180);
                    }
                }
            };

            const proofCategories = [
                { name: '📐 割补法', proofs: ['p01','p02','p03'] },
                { name: '🧩 拼摆法', proofs: ['p04','p05','p06'] },
                { name: '🔷 相似法', proofs: ['p07','p08','p09'] },
                { name: '📏 代数法', proofs: ['p10','p11','p12'] },
                { name: '🎯 其他经典', proofs: ['p13','p14','p15'] }
            ];

            // 渲染左侧列表
            const container = document.getElementById('proofListContainer');
            function renderProofList() {
                let html = '';
                proofCategories.forEach((cat, idx) => {
                    const catId = `cat_${idx}`;
                    html += `<div class="proof-category">`;
                    html += `<div class="category-header collapsed" onclick="window.toggleCategory(this)" data-cat="${catId}">`;
                    html += `<span>${cat.name}</span> <i class="fas fa-chevron-down"></i>`;
                    html += `</div>`;
                    html += `<div class="sub-item-list collapsed" id="${catId}">`;
                    cat.proofs.forEach(pid => {
                        html += `<div class="proof-item ${pid === activeProofId ? 'active' : ''}" data-proof-id="${pid}" onclick="window.selectProof('${pid}')">`;
                        html += `<i class="fas fa-shapes"></i> ${proofData[pid].name}`;
                        html += `</div>`;
                    });
                    html += `</div></div>`;
                });
                container.innerHTML = html;
            }

            window.toggleCategory = function(header) {
                const catId = header.dataset.cat;
                const subDiv = document.getElementById(catId);
                if (subDiv) {
                    subDiv.classList.toggle('collapsed');
                    header.classList.toggle('collapsed');
                }
            };

            // 选择证明
            window.selectProof = function(proofId) {
                activeProofId = proofId;
                document.querySelectorAll('.proof-item').forEach(el => {
                    if (el.dataset.proofId === proofId) el.classList.add('active');
                    else el.classList.remove('active');
                });
                // 更新标题和步骤
                document.getElementById('activeProofTitle').innerHTML = `<i class="fas fa-play-circle" style="color:#8fcbff;"></i> ${proofData[proofId].name}`;
                const stepsList = document.getElementById('stepsList');
                stepsList.innerHTML = proofData[proofId].steps.map(s => `<li><i class="fas fa-angle-right"></i> ${s}</li>`).join('');
                // 重绘画布
                drawProof(proofId);
            };

            // 画布绘制函数 (右侧证明画布)
            const canvas = document.getElementById('proofCanvas');
            const ctx = canvas.getContext('2d');

            window.drawProof = function(proofId) {
                const data = proofData[proofId];
                if (data && data.draw) {
                    data.draw(ctx, a, b, c);
                } else {
                    ctx.clearRect(0,0,canvas.width,canvas.height);
                    ctx.fillStyle = 'white';
                    ctx.font = '20px Inter';
                    ctx.fillText('绘制中...', 200,200);
                }
                // 加注a,b,c值
                ctx.font = '14px Inter';
                ctx.fillStyle = '#c3e2ff';
                ctx.fillText(`a=${a.toFixed(1)} b=${b.toFixed(1)} c=${c.toFixed(2)}`, 20, 30);
            };

            // 初始化
            renderProofList();
            updateSliders();  // 触发绘图
            drawMainDemo();
            setTimeout(() => selectProof('p01'), 200);

            // 烟花特效
            const fCanvas = document.getElementById('fireworks-canvas');
            const fCtx = fCanvas.getContext('2d');
            let width, height, particles = [];
            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                fCanvas.width = width;
                fCanvas.height = height;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
            function createFirework(x, y) {
                const count = 12 + Math.floor(Math.random() * 10);
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * 2 * Math.PI;
                    const speed = 2 + Math.random() * 5;
                    const vx = Math.cos(angle) * speed * (0.5 + Math.random() * 0.8);
                    const vy = Math.sin(angle) * speed * (0.5 + Math.random() * 0.8);
                    const life = 0.8 + Math.random() * 0.8;
                    particles.push({ x, y, vx, vy, size: 3 + Math.random() * 5, color: `hsl(${Math.random() * 60 + 200}, 80%, 70%)`, life, maxLife: life });
                }
            }
            function animateParticles() {
                fCtx.clearRect(0, 0, width, height);
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life -= 0.008;
                    if (p.life <= 0 || p.y > height + 50 || p.x < -50 || p.x > width + 50) { particles.splice(i, 1); continue; }
                    fCtx.globalAlpha = p.life * 0.8;
                    fCtx.beginPath();
                    fCtx.arc(p.x, p.y, p.size * (p.life / p.maxLife) * 1.2, 0, Math.PI * 2);
                    fCtx.fillStyle = p.color;
                    fCtx.fill();
                }
                requestAnimationFrame(animateParticles);
            }
            animateParticles();
            document.addEventListener('click', (e) => createFirework(e.clientX, e.clientY));
        })();
    </script>
</body>
</html>
