<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>勾股定理 · 15证法 · 动态演示 (修正版)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* 样式完全保留，未作修改 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif; min-height: 100vh;
            background: radial-gradient(ellipse at 20% 20%, #1a3a52 0%, #0d1f2d 50%, #081018 100%);
            background-attachment: fixed; padding: 1rem; color: #e8f4fc;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        
        .header {
            text-align: center; padding: 1rem; margin-bottom: 1rem;
        }
        .header h1 {
            font-size: 2.2rem; font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #7dd3fc 50%, #38bdf8 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header p { color: #94a3b8; margin-top: 0.3rem; font-size: 0.95rem; }

        .control-panel {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8), rgba(15, 23, 42, 0.8));
            backdrop-filter: blur(12px);
            border: 2px solid rgba(56, 189, 248, 0.3);
            border-radius: 16px;
            padding: 1.2rem; margin-bottom: 1.2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .control-title {
            text-align: center; color: #7dd3fc; font-weight: 600;
            margin-bottom: 0.8rem; font-size: 1rem;
        }
        .control-row {
            display: flex; flex-wrap: wrap; gap: 1rem;
            align-items: center; justify-content: center;
        }
        .control-item {
            display: flex; align-items: center; gap: 0.5rem;
            background: rgba(15, 23, 42, 0.6);
            padding: 0.6rem 1rem;
            border-radius: 10px;
            border: 1px solid rgba(148, 163, 184, 0.2);
        }
        .control-item label {
            font-weight: 700; font-size: 1.1rem; min-width: 24px;
        }
        .control-item input[type="range"] {
            width: 140px; height: 8px; -webkit-appearance: none;
            background: rgba(148, 163, 184, 0.3); border-radius: 4px;
            cursor: pointer;
        }
        .control-item input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 20px; height: 20px;
            background: linear-gradient(135deg, #38bdf8, #0ea5e9);
            border-radius: 50%; cursor: pointer;
            box-shadow: 0 0 12px rgba(56, 189, 248, 0.6);
            border: 2px solid #fff;
        }
        .control-item input[type="number"] {
            width: 65px; padding: 0.35rem 0.5rem; font-size: 1rem;
            background: rgba(15, 23, 42, 0.9);
            border: 2px solid rgba(56, 189, 248, 0.3);
            border-radius: 8px; color: #e8f4fc; text-align: center;
            font-weight: 600;
        }
        .control-item input[type="number"]:focus {
            outline: none; border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }
        .formula-display {
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.25), rgba(139, 92, 246, 0.25));
            padding: 0.8rem 1.5rem; border-radius: 12px;
            border: 1px solid rgba(56, 189, 248, 0.4);
            font-size: 1.2rem; font-weight: 600;
        }
        .formula-display span { color: #7dd3fc; }
        .formula-display .plus { color: #94a3b8; }
        .formula-display .equals { color: #4ade80; }

        .main-demo {
            background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px);
            border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 16px;
            padding: 1.2rem; margin-bottom: 1.2rem;
        }
        .main-demo h3 {
            display: flex; align-items: center; gap: 0.5rem;
            margin-bottom: 0.8rem; color: #7dd3fc; font-size: 1rem;
        }
        #mainCanvas {
            width: 100%; height: 280px; background: rgba(15, 23, 42, 0.5);
            border-radius: 12px; display: block;
        }

        .content-grid {
            display: grid; grid-template-columns: 280px 1fr; gap: 1.2rem;
        }
        @media (max-width: 900px) {
            .content-grid { grid-template-columns: 1fr; }
        }

        .proof-list {
            background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px);
            border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 16px;
            padding: 1rem; max-height: 550px; overflow-y: auto;
        }
        .proof-list h3 { margin-bottom: 0.8rem; color: #7dd3fc; font-size: 1rem; }
        .category {
            margin-bottom: 0.5rem; border-radius: 10px;
            background: rgba(15, 23, 42, 0.4); overflow: hidden;
        }
        .category-header {
            padding: 0.6rem 0.8rem; font-weight: 600; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(56, 189, 248, 0.1);
            border-left: 3px solid #38bdf8;
            font-size: 0.9rem;
        }
        .category-header:hover { background: rgba(56, 189, 248, 0.2); }
        .category-header i { transition: transform 0.3s; font-size: 0.8rem; }
        .category-header.collapsed i { transform: rotate(-90deg); }
        .proof-items { padding: 0.2rem; }
        .proof-items.collapsed { display: none; }
        .proof-item {
            padding: 0.5rem 0.6rem 0.5rem 1.2rem; margin: 0.15rem 0;
            border-radius: 8px; cursor: pointer; font-size: 0.88rem;
            display: flex; align-items: center; gap: 0.4rem;
            transition: all 0.2s;
        }
        .proof-item:hover { background: rgba(56, 189, 248, 0.2); }
        .proof-item.active {
            background: linear-gradient(90deg, rgba(56, 189, 248, 0.35), rgba(139, 92, 246, 0.35));
            border-left: 3px solid #38bdf8;
        }
        .proof-item i { color: #7dd3fc; width: 16px; font-size: 0.8rem; }

        .animation-card {
            background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px);
            border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 16px;
            padding: 1.2rem;
        }
        .animation-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 0.8rem; padding-bottom: 0.6rem;
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
        }
        .animation-header h3 {
            display: flex; align-items: center; gap: 0.5rem;
            color: #7dd3fc; font-size: 1.1rem;
        }
        .anim-controls {
            display: flex; gap: 0.5rem;
            align-items: center;
        }
        .play-btn, .step-btn {
            background: linear-gradient(135deg, #38bdf8, #8b5cf6);
            border: none; padding: 0.4rem 0.8rem; border-radius: 8px;
            color: white; cursor: pointer; font-weight: 600;
            display: flex; align-items: center; gap: 0.4rem;
            transition: all 0.2s; font-size: 0.85rem;
        }
        .play-btn:hover, .step-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(56, 189, 248, 0.4);
        }
        .play-btn:disabled {
            opacity: 0.6; cursor: not-allowed; transform: none;
        }
        .step-indicator {
            background: rgba(15, 23, 42, 0.8);
            padding: 0.4rem 0.8rem; border-radius: 8px;
            font-size: 0.85rem; color: #94a3b8;
            border: 1px solid rgba(148, 163, 184, 0.2);
        }
        #proofCanvas {
            width: 100%; height: 350px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 12px; display: block; margin-bottom: 0.8rem;
        }
        .steps-panel {
            background: rgba(15, 23, 42, 0.5); border-radius: 12px;
            padding: 0.8rem; border: 1px solid rgba(148, 163, 184, 0.15);
        }
        .steps-panel h4 {
            color: #7dd3fc; margin-bottom: 0.6rem;
            font-size: 0.95rem; display: flex; align-items: center; gap: 0.4rem;
        }
        .steps-list { list-style: none; }
        .steps-list li {
            padding: 0.4rem 0; padding-left: 1.2rem; position: relative;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
            font-size: 0.88rem; color: #cbd5e1;
            transition: all 0.3s;
        }
        .steps-list li:last-child { border-bottom: none; }
        .steps-list li::before {
            content: '→'; position: absolute; left: 0;
            color: #38bdf8; font-weight: bold;
        }
        .steps-list li.active {
            color: #fff;
            background: rgba(56, 189, 248, 0.1);
            border-radius: 6px;
            padding-left: 1.5rem;
            margin-left: -0.3rem;
        }
        .steps-list li.active::before {
            content: '▶'; color: #4ade80;
        }
        .steps-list li.completed::before {
            content: '✓'; color: #4ade80;
        }

        .anim-progress {
            height: 4px;
            background: rgba(148, 163, 184, 0.2);
            border-radius: 2px;
            margin-bottom: 0.8rem;
            overflow: hidden;
        }
        .anim-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #38bdf8, #8b5cf6);
            border-radius: 2px;
            transition: width 0.3s ease;
            width: 0%;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); border-radius: 3px; }
        ::-webkit-scrollbar-thumb { background: rgba(56, 189, 248, 0.5); border-radius: 3px; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1><i class="fas fa-shapes"></i> 勾股定理 · 15种证明方法</h1>
            <p>拖动滑块或输入数值调整边长，点击播放按钮观看分步动画演示</p>
        </header>

        <!-- Control Panel -->
        <div class="control-panel">
            <div class="control-title"><i class="fas fa-sliders-h"></i> 调整三角形边长</div>
            <div class="control-row">
                <div class="control-item">
                    <label style="color:#f87171;">a</label>
                    <input type="range" id="aSlider" min="3" max="12" value="6" step="0.5">
                    <input type="number" id="aInput" min="3" max="12" value="6" step="0.5">
                </div>
                <div class="control-item">
                    <label style="color:#4ade80;">b</label>
                    <input type="range" id="bSlider" min="3" max="12" value="8" step="0.5">
                    <input type="number" id="bInput" min="3" max="12" value="8" step="0.5">
                </div>
                <div class="control-item">
                    <label style="color:#a78bfa;">c</label>
                    <input type="number" id="cInput" value="10" readonly style="opacity:0.7; cursor:not-allowed;">
                </div>
                <div class="formula-display">
                    <span id="a2">36</span> <span class="plus">+</span> <span id="b2">64</span> <span class="equals">=</span> <span id="c2" style="color:#4ade80;">100</span>
                </div>
            </div>
        </div>

        <!-- Main Demo -->
        <div class="main-demo">
            <h3><i class="fas fa-chart-area"></i> 面积关系演示</h3>
            <canvas id="mainCanvas" width="900" height="280"></canvas>
        </div>

        <!-- Content Grid -->
        <div class="content-grid">
            <!-- Proof List -->
            <div class="proof-list">
                <h3><i class="fas fa-list"></i> 15种证明</h3>
                <div id="proofListContainer"></div>
            </div>

            <!-- Animation Card -->
            <div class="animation-card">
                <div class="animation-header">
                    <h3 id="proofTitle"><i class="fas fa-cube"></i> 赵爽弦图</h3>
                    <div class="anim-controls">
                        <div class="step-indicator">步骤 <span id="currentStep">0</span>/<span id="totalSteps">4</span></div>
                        <button class="step-btn" id="prevBtn" onclick="prevStep()"><i class="fas fa-step-backward"></i></button>
                        <button class="play-btn" id="playBtn" onclick="togglePlay()"><i class="fas fa-play"></i> 播放</button>
                        <button class="step-btn" id="nextBtn" onclick="nextStep()"><i class="fas fa-step-forward"></i></button>
                    </div>
                </div>
                <div class="anim-progress">
                    <div class="anim-progress-bar" id="progressBar"></div>
                </div>
                <canvas id="proofCanvas" width="700" height="350"></canvas>
                <div class="steps-panel">
                    <h4><i class="fas fa-list-ol"></i> 证明步骤</h4>
                    <ul class="steps-list" id="stepsList"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
    // ========== 全局变量 ==========
    let a = 6, b = 8, c = 10;
    let activeProofId = 'p01';
    let currentStep = 0;
    let isPlaying = false;
    let playInterval = null;
    let totalSteps = 4;

    // ========== DOM元素 ==========
    const aSlider = document.getElementById('aSlider');
    const aInput = document.getElementById('aInput');
    const bSlider = document.getElementById('bSlider');
    const bInput = document.getElementById('bInput');
    const cInput = document.getElementById('cInput');
    const a2Span = document.getElementById('a2');
    const b2Span = document.getElementById('b2');
    const c2Span = document.getElementById('c2');
    const mainCanvas = document.getElementById('mainCanvas');
    const mainCtx = mainCanvas.getContext('2d');
    const proofCanvas = document.getElementById('proofCanvas');
    const proofCtx = proofCanvas.getContext('2d');

    // ========== 双向绑定控制 ==========
    function updateValues() {
        a = parseFloat(aSlider.value);
        b = parseFloat(bSlider.value);
        c = Math.sqrt(a*a + b*b);
        
        aSlider.value = aInput.value = a.toFixed(1);
        bSlider.value = bInput.value = b.toFixed(1);
        cInput.value = c.toFixed(2);
        
        a2Span.textContent = (a*a).toFixed(1);
        b2Span.textContent = (b*b).toFixed(1);
        c2Span.textContent = (c*c).toFixed(1);
        
        drawMainDemo();
        drawProof(activeProofId, currentStep);
    }

    aSlider.addEventListener('input', () => { aInput.value = aSlider.value; updateValues(); });
    aInput.addEventListener('change', () => { 
        let val = parseFloat(aInput.value);
        if (val < 3) val = 3; if (val > 12) val = 12;
        aSlider.value = val; updateValues(); 
    });

    bSlider.addEventListener('input', () => { bInput.value = bSlider.value; updateValues(); });
    bInput.addEventListener('change', () => { 
        let val = parseFloat(bInput.value);
        if (val < 3) val = 3; if (val > 12) val = 12;
        bSlider.value = val; updateValues(); 
    });

    // ========== 主演示区绘制 ==========
    function drawMainDemo() {
        const ctx = mainCtx;
        const w = mainCanvas.width, h = mainCanvas.height;
        ctx.clearRect(0, 0, w, h);
        
        const scale = 20;
        const ox = w/2 - 50, oy = h - 30;
        
        // 直角三角形
        ctx.fillStyle = 'rgba(56, 189, 248, 0.2)';
        ctx.strokeStyle = '#38bdf8';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(ox, oy);
        ctx.lineTo(ox + a*scale, oy);
        ctx.lineTo(ox, oy - b*scale);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        
        // 直角标记
        ctx.strokeStyle = '#94a3b8';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(ox + 10, oy);
        ctx.lineTo(ox + 10, oy - 10);
        ctx.lineTo(ox, oy - 10);
        ctx.stroke();
        
        // a²正方形
        ctx.fillStyle = 'rgba(56, 189, 248, 0.35)';
        ctx.strokeStyle = '#38bdf8';
        ctx.fillRect(ox, oy, a*scale, a*scale);
        ctx.strokeRect(ox, oy, a*scale, a*scale);
        
        // b²正方形
        ctx.fillStyle = 'rgba(74, 222, 128, 0.35)';
        ctx.strokeStyle = '#4ade80';
        ctx.fillRect(ox - b*scale, oy - b*scale, b*scale, b*scale);
        ctx.strokeRect(ox - b*scale, oy - b*scale, b*scale, b*scale);
        
        // c²正方形
        const Ax = ox + a*scale, Ay = oy;
        const Bx = ox, By = oy - b*scale;
        const vx = b*scale, vy = -a*scale;
        ctx.fillStyle = 'rgba(167, 139, 250, 0.35)';
        ctx.strokeStyle = '#a78bfa';
        ctx.beginPath();
        ctx.moveTo(Ax, Ay);
        ctx.lineTo(Bx, By);
        ctx.lineTo(Bx + vx, By + vy);
        ctx.lineTo(Ax + vx, Ay + vy);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        
        // 标注
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 13px Inter';
        ctx.fillText('a²', ox + a*scale*0.35, oy + a*scale*0.55);
        ctx.fillText('b²', ox - b*scale*0.65, oy - b*scale*0.45);
        ctx.fillText('c²', ox + a*scale*0.35 + vx*0.3, oy - b*scale*0.45 + vy*0.3);
        
        ctx.font = '11px Inter';
        ctx.fillStyle = '#94a3b8';
        ctx.fillText(`a=${a.toFixed(1)}`, ox + a*scale*0.2, oy + 18);
        ctx.fillText(`b=${b.toFixed(1)}`, ox - b*scale - 30, oy - b*scale*0.5);
        ctx.fillText(`c=${c.toFixed(2)}`, ox + a*scale*0.2, oy - b*scale*0.5 - 30);
        
        ctx.font = 'bold 14px Inter';
        ctx.fillStyle = '#7dd3fc';
        ctx.fillText('a² + b² = c²', 20, 25);
    }

    // ========== 15种证明数据 (修正p01: 赵爽弦图 的c²为旋转正方形) ==========
    const proofData = {
        p01: {
            name: '赵爽弦图',
            category: '割补法',
            steps: [
                '以四个全等直角三角形的斜边为边，围成一个大正方形',
                '大正方形边长为c，面积为c²',
                '大正方形也可看作边长为(a+b)的正方形减去四个三角形',
                'c² = (a+b)² - 4×(½ab) = a² + 2ab + b² - 2ab = a² + b²'
            ],
            draw: function(ctx, step) {
                const w = proofCanvas.width, h = proofCanvas.height;
                ctx.clearRect(0, 0, w, h);
                const scale = 18;
                const ox = w/2 - (a+b)*scale/2, oy = h/2 + (a+b)*scale/2 + 20;
                const bigSize = (a+b) * scale;
                
                // 步骤0: 显示大正方形边框 (边长为a+b)
                ctx.strokeStyle = 'rgba(148, 163, 184, 0.5)';
                ctx.lineWidth = 2;
                ctx.strokeRect(ox, oy - bigSize, bigSize, bigSize);
                
                // 预计算四个斜边顶点 (构成旋转的c²正方形)
                const v1 = {x: ox + a*scale, y: oy};               // 右下顶点
                const v2 = {x: ox + bigSize, y: oy - a*scale};     // 左下顶点 (相对于大正方形)
                const v3 = {x: ox + b*scale, y: oy - bigSize};     // 左上顶点
                const v4 = {x: ox, y: oy - b*scale};               // 右上顶点
                
                if (step >= 1) {
                    // 步骤1: 画四个三角形 (颜色区分)
                    const colors = ['#f87171', '#4ade80', '#60a5fa', '#fbbf24'];
                    
                    // 三角形1 (右下，红色)
                    ctx.fillStyle = colors[0] + '80';
                    ctx.beginPath();
                    ctx.moveTo(ox, oy);
                    ctx.lineTo(ox + a*scale, oy);
                    ctx.lineTo(ox, oy - b*scale);
                    ctx.closePath();
                    ctx.fill();
                    ctx.strokeStyle = colors[0];
                    ctx.stroke();
                    
                    // 三角形2 (左下，绿色)
                    ctx.fillStyle = colors[1] + '80';
                    ctx.beginPath();
                    ctx.moveTo(ox + a*scale, oy);
                    ctx.lineTo(ox + bigSize, oy);
                    ctx.lineTo(ox + bigSize, oy - a*scale);
                    ctx.closePath();
                    ctx.fill();
                    ctx.strokeStyle = colors[1];
                    ctx.stroke();
                    
                    // 三角形3 (左上，蓝色)
                    ctx.fillStyle = colors[2] + '80';
                    ctx.beginPath();
                    ctx.moveTo(ox + bigSize, oy - a*scale);
                    ctx.lineTo(ox + bigSize, oy - bigSize);
                    ctx.lineTo(ox + b*scale, oy - bigSize);
                    ctx.closePath();
                    ctx.fill();
                    ctx.strokeStyle = colors[2];
                    ctx.stroke();
                    
                    // 三角形4 (右上，黄色)
                    ctx.fillStyle = colors[3] + '80';
                    ctx.beginPath();
                    ctx.moveTo(ox + b*scale, oy - bigSize);
                    ctx.lineTo(ox, oy - bigSize);
                    ctx.lineTo(ox, oy - b*scale);
                    ctx.closePath();
                    ctx.fill();
                    ctx.strokeStyle = colors[3];
                    ctx.stroke();
                }
                
                if (step >= 2) {
                    // 步骤2: 绘制旋转的c²正方形 (由四个斜边顶点围成)
                    ctx.fillStyle = 'rgba(167, 139, 250, 0.5)'; // 紫色半透明
                    ctx.strokeStyle = '#a78bfa';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(v1.x, v1.y);
                    ctx.lineTo(v2.x, v2.y);
                    ctx.lineTo(v3.x, v3.y);
                    ctx.lineTo(v4.x, v4.y);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                }
                
                if (step >= 3) {
                    // 步骤3: 显示公式和标注
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 13px Inter';
                    // 计算旋转正方形的中心
                    const cx = (v1.x + v2.x + v3.x + v4.x) / 4;
                    const cy = (v1.y + v2.y + v3.y + v4.y) / 4;
                    ctx.fillText('c²', cx - 12, cy + 5);
                    
                    ctx.font = '11px Inter';
                    ctx.fillStyle = '#94a3b8';
                    ctx.fillText('边长 = a+b', ox + 5, oy + 15);
                    
                    // 在大正方形旁写公式
                    ctx.font = 'bold 12px Inter';
                    ctx.fillStyle = '#7dd3fc';
                    ctx.fillText('(a+b)² = c² + 2ab', ox + bigSize/2 - 60, oy - bigSize - 10);
                }
            }
        },
        p02: {
            name: '邹元治证法',
            category: '割补法',
            steps: [
                '将四个全等直角三角形拼成边长为(a+b)的大正方形',

                ctx.font = '11px Inter';
                ctx.fillText('a', ox - 15, oy - a*scale*0.5);
                ctx.fillText('b', ox + b*scale*0.4, oy + 15);
                ctx.fillText('c', ox + b*scale*0.3, oy - a*scale*0.3);
            }
        },
        p10: {
            name: '差平方公式法',
            category: '代数法',
            steps: [
                '利用代数恒等式展开',
                '(a+b)² = a² + 2ab + b²',
                '(a-b)² = a² - 2ab + b²',
                '结合几何关系推出 a² + b² = c²'
            ],
            draw: function(ctx, step) {
                const w = proofCanvas.width, h = proofCanvas.height;
                ctx.clearRect(0, 0, w, h);
                
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 16px Inter';
                ctx.fillText('代数恒等式', w/2 - 50, 50);
                
                if (step >= 0) {
                    ctx.font = '15px Inter';
                    ctx.fillStyle = '#7dd3fc';
                    ctx.fillText('(a + b)² = a² + 2ab + b²', w/2 - 110, 100);
                }
                
                if (step >= 1) {
                    ctx.fillStyle = '#fbbf24';
                    ctx.fillText('(a - b)² = a² - 2ab + b²', w/2 - 110, 140);
                }
                
                if (step >= 2) {
                    ctx.strokeStyle = 'rgba(148, 163, 184, 0.3)';
                    ctx.beginPath();
                    ctx.moveTo(w/2 - 150, 165);
                    ctx.lineTo(w/2 + 150, 165);
                    ctx.stroke();
                    
                    ctx.fillStyle = '#4ade80';
                    ctx.fillText('相减: (a+b)² - (a-b)² = 4ab', w/2 - 130, 200);
                }
                
                if (step >= 3) {
                    ctx.fillStyle = '#a78bfa';
                    ctx.fillText('∴ c² = a² + b²', w/2 - 60, 240);
                }
            }
        },
        p11: {
            name: '余弦定理特例',
            category: '代数法',
            steps: [
                '余弦定理：c² = a² + b² - 2ab·cosC',
                '当 C = 90° 时，cos90° = 0',
                '因此 c² = a² + b²',
                '勾股定理是余弦定理的特例'
            ],
            draw: function(ctx, step) {
                const w = proofCanvas.width, h = proofCanvas.height;
                ctx.clearRect(0, 0, w, h);
                const scale = 17;
                const ox = w/2 - b*scale/2, oy = h/2 + a*scale/2 + 30;
                
                if (step >= 0) {
                    ctx.fillStyle = 'rgba(56, 189, 248, 0.2)';
                    ctx.strokeStyle = '#38bdf8';
                    ctx.beginPath();
                    ctx.moveTo(ox, oy);
                    ctx.lineTo(ox + b*scale, oy);
                    ctx.lineTo(ox, oy - a*scale);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                }
                
                if (step >= 1) {
                    ctx.strokeStyle = '#fbbf24';
                    ctx.beginPath();
                    ctx.moveTo(ox + 10, oy);
                    ctx.lineTo(ox + 10, oy - 10);
                    ctx.lineTo(ox, oy - 10);
                    ctx.stroke();
                }
                
                if (step >= 2) {
                    ctx.strokeStyle = '#f87171';
                    ctx.beginPath();
                    ctx.arc(ox, oy, 25, -Math.PI/2, 0);
                    ctx.stroke();
                    
                    ctx.fillStyle = '#f87171';
                    ctx.font = 'bold 13px Inter';
                    ctx.fillText('C=90°', ox + 30, oy - 5);
                }
                
                ctx.fillStyle = '#fff';
                ctx.font = '11px Inter';
                ctx.fillText('a', ox - 15, oy - a*scale*0.5);
                ctx.fillText('b', ox + b*scale*0.4, oy + 15);
                ctx.fillText('c', ox + b*scale*0.3, oy - a*scale*0.3);
            }
        },
        p12: {
            name: '向量点积法',
            category: '代数法',
            steps: [
                '设向量 α = (a, 0)，向量 β = (0, b)',
                '则 α ⊥ β（两向量垂直）',
                '|α - β|² = |α|² + |β|² = a² + b² = c²',
                '这是向量正交性的直接结果'
            ],
            draw: function(ctx, step) {
                const w = proofCanvas.width, h = proofCanvas.height;
                ctx.clearRect(0, 0, w, h);
                const scale = 17;
                const ox = w/2 - 70, oy = h/2 + 70;
                
                if (step >= 0) {
                    ctx.strokeStyle = 'rgba(148, 163, 184, 0.3)';
                    ctx.beginPath();
                    ctx.moveTo(ox - 20, oy);
                    ctx.lineTo(ox + 180, oy);
                    ctx.moveTo(ox, oy + 20);
                    ctx.lineTo(ox, oy - 180);
                    ctx.stroke();
                }
                
                if (step >= 1) {
                    ctx.strokeStyle = '#f87171';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(ox, oy);
                    ctx.lineTo(ox + a*scale, oy);
                    ctx.stroke();
                }
                
                if (step >= 2) {
                    ctx.strokeStyle = '#4ade80';
                    ctx.beginPath();
                    ctx.moveTo(ox, oy);
                    ctx.lineTo(ox, oy - b*scale);
                    ctx.stroke();
                }
                
                if (step >= 3) {
                    ctx.strokeStyle = '#60a5fa';
                    ctx.beginPath();
                    ctx.moveTo(ox + a*scale, oy);
                    ctx.lineTo(ox, oy - b*scale);
                    ctx.stroke();
                    
                    ctx.strokeStyle = '#fbbf24';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(ox + 8, oy);
                    ctx.lineTo(ox + 8, oy - 8);
                    ctx.lineTo(ox, oy - 8);
                    ctx.stroke();
                }
                
                ctx.fillStyle = '#f87171';
                ctx.font = 'bold 13px Inter';
                if (step >= 1) ctx.fillText('α', ox + a*scale*0.5, oy + 22);
                ctx.fillStyle = '#4ade80';
                if (step >= 2) ctx.fillText('β', ox - 22, oy - b*scale*0.5);
                ctx.fillStyle = '#60a5fa';
                if (step >= 3) ctx.fillText('α-β', ox + a*scale*0.3, oy - b*scale*0.3);
            }
        },
        p13: {
            name: '杨作玫证法',
            category: '其他经典',
            steps: [
                '通过旋转和对称构造正方形',
                '将直角三角形绕直角顶点旋转90°、180°、270°',
                '四个三角形形成大正方形，内部有c²',
                '通过面积关系得证'
            ],
            draw: function(ctx, step) {
                const w = proofCanvas.width, h = proofCanvas.height;
                ctx.clearRect(0, 0, w, h);
                const scale = 14;
                const ox = w/2, oy = h/2 + 50;
                
                const colors = ['rgba(248, 113, 113, 0.5)', 'rgba(74, 222, 128, 0.5)', 'rgba(96, 165, 250, 0.5)', 'rgba(251, 191, 36, 0.5)'];
                
                if (step >= 0) {
                    ctx.fillStyle = colors[0];
                    ctx.strokeStyle = '#f87171';
                    ctx.beginPath();
                    ctx.moveTo(ox, oy);
                    ctx.lineTo(ox + a*scale, oy);
                    ctx.lineTo(ox, oy - b*scale);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                }
                
                if (step >= 1) {
                    ctx.fillStyle = colors[1];
                    ctx.strokeStyle = '#4ade80';
                    ctx.beginPath();
                    ctx.moveTo(ox, oy);
                    ctx.lineTo(ox, oy + a*scale);
                    ctx.lineTo(ox + b*scale, oy);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                }
                
                if (step >= 2) {
                    ctx.fillStyle = colors[2];
                    ctx.strokeStyle = '#60a5fa';
                    ctx.beginPath();
                    ctx.moveTo(ox, oy);
                    ctx.lineTo(ox - a*scale, oy);
                    ctx.lineTo(ox, oy + b*scale);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                    
                    ctx.fillStyle = colors[3];
                    ctx.strokeStyle = '#fbbf24';
                    ctx.beginPath();
                    ctx.moveTo(ox, oy);
                    ctx.lineTo(ox, oy - a*scale);
                    ctx.lineTo(ox - b*scale, oy);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                }
                
                if (step >= 3) {
                    const big = (a+b) * scale;
                    ctx.strokeStyle = 'rgba(148, 163, 184, 0.5)';
                    ctx.setLineDash([5, 5]);
                    ctx.strokeRect(ox - b*scale, oy - a*scale, big, big);
                    ctx.setLineDash([]);
                    
                    const cSize = c * scale;
                    ctx.fillStyle = 'rgba(167, 139, 250, 0.3)';
                    ctx.strokeStyle = '#a78bfa';
                    ctx.fillRect(ox - cSize/2, oy - cSize/2, cSize, cSize);
                    ctx.strokeRect(ox - cSize/2, oy - cSize/2, cSize, cSize);
                }
            }
        },
        p14: {
            name: '希波克拉底月牙',
            category: '其他经典',
            steps: [
                '以直角三角形三边为直径作半圆',
                '两直角边上半圆面积之和 = 斜边上半圆面积',
                '两个月牙形面积之和 = 直角三角形面积',
                '这是希波克拉底的著名发现'
            ],
            draw: function(ctx, step) {
                const w = proofCanvas.width, h = proofCanvas.height;
                ctx.clearRect(0, 0, w, h);
                const scale = 15;
                const ox = w/2 - b*scale/2, oy = h/2 + a*scale/2 + 20;
                
                if (step >= 0) {
                    ctx.fillStyle = 'rgba(56, 189, 248, 0.2)';
                    ctx.strokeStyle = '#38bdf8';
                    ctx.beginPath();
                    ctx.moveTo(ox, oy);
                    ctx.lineTo(ox + b*scale, oy);
                    ctx.lineTo(ox, oy - a*scale);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                }
                
                if (step >= 1) {
                    ctx.strokeStyle = '#f87171';
                    ctx.beginPath();
                    ctx.arc(ox, oy - a*scale*0.5, a*scale*0.5, -Math.PI/2, Math.PI/2);
                    ctx.stroke();
                }
                
                if (step >= 2) {
                    ctx.strokeStyle = '#4ade80';
                    ctx.beginPath();
                    ctx.arc(ox + b*scale*0.5, oy, b*scale*0.5, 0, Math.PI);
                    ctx.stroke();
                }
                
                if (step >= 3) {
                    const cx = ox + b*scale*0.5;
                    const cy = oy - a*scale*0.5;
                    const cAngle = Math.atan2(a, b);
                    ctx.strokeStyle = '#a78bfa';
                    ctx.beginPath();
                    ctx.arc(cx, cy, c*scale*0.5, cAngle + Math.PI/2, cAngle - Math.PI/2);
                    ctx.stroke();
                }
                
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 12px Inter';
                ctx.fillText('希波克拉底月牙', w/2 - 55, 40);
            }
        },
        p15: {
            name: '帕斯卡证法',
            category: '其他经典',
            steps: [
                '利用相似三角形和比例线段',
                '作斜边上的高，形成三个相似直角三角形',
                '由相似比：a² = c·p, b² = c·q',
                '相加得 a² + b² = c²'
            ],
            draw: function(ctx, step) {
                const w = proofCanvas.width, h = proofCanvas.height;
                ctx.clearRect(0, 0, w, h);
                const scale = 17;
                const ox = w/2 - c*scale/2, oy = h/2 + 60;
                
                const p = (a*a) / c;
                const footX = ox + p*scale;
                const hh = (a*b) / c;
                const footY = oy - hh*scale;
                
                if (step >= 0) {
                    ctx.fillStyle = 'rgba(56, 189, 248, 0.15)';
                    ctx.strokeStyle = '#38bdf8';
                    ctx.beginPath();
                    ctx.moveTo(ox, oy);
                    ctx.lineTo(ox + c*scale, oy);
                    ctx.lineTo(ox, oy - a*scale);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                }
                
                if (step >= 1) {
                    ctx.strokeStyle = '#fbbf24';
                    ctx.beginPath();
                    ctx.moveTo(ox, oy - a*scale);
                    ctx.lineTo(footX, footY);
                    ctx.lineTo(ox + c*scale, oy);
                    ctx.stroke();
                }
                
                if (step >= 2) {
                    ctx.fillStyle = 'rgba(248, 113, 113, 0.25)';
                    ctx.beginPath();
                    ctx.moveTo(ox, oy);
                    ctx.lineTo(footX, footY);
                    ctx.lineTo(ox, oy - a*scale);
                    ctx.closePath();
                    ctx.fill();
                    ctx.strokeStyle = '#f87171';
                    ctx.stroke();
                    
                    ctx.fillStyle = 'rgba(167, 139, 250, 0.25)';
                    ctx.beginPath();
                    ctx.moveTo(ox + c*scale, oy);
                    ctx.lineTo(footX, footY);
                    ctx.lineTo(ox, oy);
                    ctx.closePath();
                    ctx.fill();
                    ctx.strokeStyle = '#a78bfa';
                    ctx.stroke();
                }
                
                ctx.fillStyle = '#fff';
                ctx.font = '11px Inter';
                ctx.fillText('a', ox - 15, oy - a*scale*0.5);
                ctx.fillText('b', ox + c*scale*0.4, oy - a*scale*0.3);
                ctx.fillText('c', ox + c*scale*0.5, oy + 15);
                if (step >= 1) ctx.fillText(`p=${p.toFixed(1)}`, ox + p*scale*0.2, oy + 15);
            }
        }
    };

    const proofCategories = [
        { name: '📐 割补法', proofs: ['p01', 'p02', 'p03'] },
        { name: '🧩 拼摆法', proofs: ['p04', 'p05', 'p06'] },
        { name: '🔷 相似法', proofs: ['p07', 'p08', 'p09'] },
        { name: '📏 代数法', proofs: ['p10', 'p11', 'p12'] },
        { name: '🎯 其他经典', proofs: ['p13', 'p14', 'p15'] }
    ];

    // ========== 渲染证明列表 ==========
    function renderProofList() {
        const container = document.getElementById('proofListContainer');
        let html = '';
        proofCategories.forEach((cat, idx) => {
            const catId = `cat_${idx}`;
            const isFirst = idx === 0;
            html += `<div class="category">`;
            html += `<div class="category-header ${!isFirst ? 'collapsed' : ''}" onclick="toggleCategory(this)" data-cat="${catId}">`;
            html += `<span>${cat.name}</span><i class="fas fa-chevron-down"></i>`;
            html += `</div>`;
            html += `<div class="proof-items ${!isFirst ? 'collapsed' : ''}" id="${catId}">`;
            cat.proofs.forEach(pid => {
                const proof = proofData[pid];
                html += `<div class="proof-item ${pid === activeProofId ? 'active' : ''}" data-id="${pid}" onclick="selectProof('${pid}')">`;
                html += `<i class="fas fa-cube"></i>${proof.name}`;
                html += `</div>`;
            });
            html += `</div></div>`;
        });
        container.innerHTML = html;
    }

    function toggleCategory(header) {
        const catId = header.dataset.cat;
        const items = document.getElementById(catId);
        items.classList.toggle('collapsed');
        header.classList.toggle('collapsed');
    }

    function selectProof(pid) {
        activeProofId = pid;
        currentStep = 0;
        stopAnimation();
        
        document.querySelectorAll('.proof-item').forEach(el => {
            el.classList.toggle('active', el.dataset.id === pid);
        });
        
        const proof = proofData[pid];
        totalSteps = proof.steps.length;
        
        document.getElementById('proofTitle').innerHTML = `<i class="fas fa-cube"></i> ${proof.name}`;
        document.getElementById('totalSteps').textContent = totalSteps;
        document.getElementById('currentStep').textContent = currentStep;
        
        renderSteps();
        updateProgress();
        drawProof(pid, currentStep);
    }

    function renderSteps() {
        const proof = proofData[activeProofId];
        const list = document.getElementById('stepsList');
        list.innerHTML = proof.steps.map((s, i) => {
            let cls = '';
            if (i < currentStep) cls = 'completed';
            else if (i === currentStep) cls = 'active';
            return `<li class="${cls}">${s}</li>`;
        }).join('');
    }

    function updateProgress() {
        const pct = (currentStep / (totalSteps - 1)) * 100;
        document.getElementById('progressBar').style.width = pct + '%';
        document.getElementById('currentStep').textContent = currentStep;
    }

    function drawProof(pid, step) {
        const proof = proofData[pid];
        if (proof && proof.draw) {
            proof.draw(proofCtx, step);
        }
    }

    // ========== 动画控制 ==========
    function togglePlay() {
        if (isPlaying) {
            stopAnimation();
        } else {
            startAnimation();
        }
    }

    function startAnimation() {
        isPlaying = true;
        document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i> 暂停';
        
        playInterval = setInterval(() => {
            if (currentStep < totalSteps - 1) {
                currentStep++;
            } else {
                currentStep = 0;
            }
            renderSteps();
            updateProgress();
            drawProof(activeProofId, currentStep);
        }, 1500);
    }

    function stopAnimation() {
        isPlaying = false;
        clearInterval(playInterval);
        document.getElementById('playBtn').innerHTML = '<i class="fas fa-play"></i> 播放';
    }

    function nextStep() {
        stopAnimation();
        if (currentStep < totalSteps - 1) {
            currentStep++;
            renderSteps();
            updateProgress();
            drawProof(activeProofId, currentStep);
        }
    }

    function prevStep() {
        stopAnimation();
        if (currentStep > 0) {
            currentStep--;
            renderSteps();
            updateProgress();
            drawProof(activeProofId, currentStep);
        }
    }

    // 初始化
    renderProofList();
    updateValues();
    selectProof('p01');
    </script>
</body>
</html>
